# Copy this file to `settings.toml` and fill in your own values.
# `settings.toml` is gitignored so your WiFi credentials never end up in a commit.

# WiFi Configuration
WIFI_SSID = "your_wifi_network"
WIFI_PASSWORD = "your_wifi_password"

# Optional: NOAA Station Configuration
# Station ID for St. Petersburg, FL (default). Find yours at
# https://tidesandcurrents.noaa.gov/
TIDE_STATION = "8726724"

# Time Settings
NTP_SERVER = "time.google.com"
TIMEZONE_OFFSET = -5          # Standard-time offset: EST = -5, CST = -6, MST = -7, PST = -8
DST_AUTO = "1"                # "1" = auto +1 during US DST (2nd Sun Mar - 1st Sun Nov); "0" = disable

# LED Matrix Settings
LED_BRIGHTNESS = "0.3"        # LED brightness (0.0 = off, 1.0 = full brightness)

# Serial display mirror ("1" = print 24x8 colored snapshot of matrices to REPL
# at each frame change; "0" = silent). Handy for debugging, noisy otherwise.
DISPLAY_DUMP = "0"
